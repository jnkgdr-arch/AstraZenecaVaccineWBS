<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AstraZeneca WBS Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1584362917165-526a968579e8?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
filter:brightness(0.35);
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at top,#0b1020cc,#000);
z-index:-1;
}

.container{
display:flex;
height:100vh;
}

/* LEFT PANEL */
.left{
width:62%;
padding:15px;
overflow:auto;
}

.hero{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:10px;
border-left:4px solid #ff4d6d;
margin-bottom:10px;
}

.hero h1{
margin:0;
font-size:18px;
color:#ff6b81;
}

.hero p{
font-size:12px;
opacity:0.85;
line-height:1.4;
}

input{
width:100%;
padding:8px;
border:none;
border-radius:6px;
margin-bottom:10px;
}

/* TREE */
.node{
margin-left:14px;
border-left:1px solid rgba(255,255,255,0.08);
padding-left:10px;
}

.item{
padding:6px;
margin:4px 0;
background:rgba(255,255,255,0.04);
border-radius:6px;
cursor:pointer;
}

.item:hover{background:rgba(255,255,255,0.1);}

.l1{border-left:4px solid #ff4d6d;}
.l2{border-left:4px solid #b5179e;}
.l3{border-left:4px solid #7209b7;}
.l4{border-left:4px solid #3a0ca3;}

.children{display:none;margin-left:10px;}
.children.open{display:block;}

/* RIGHT PANEL */
.right{
width:38%;
border-left:1px solid rgba(255,255,255,0.12);
padding:18px;
background:rgba(0,0,0,0.55);
overflow:auto;
}

.title{
color:#ff6b81;
font-size:16px;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:4px 7px;
margin:3px;
border-radius:6px;
font-size:11px;
}

.red{background:#ff4d6d;}
.purple{background:#7209b7;}
.green{background:#2a9d8f;}

/* GLOBAL MAP */
.globe{
margin-top:15px;
height:180px;
border-radius:12px;
background:
radial-gradient(circle at 30% 30%, rgba(255,77,109,0.6), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(114,9,183,0.5), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(42,157,143,0.5), transparent 40%),
#0b1020;
position:relative;
border:1px solid rgba(255,255,255,0.1);
}

.pin{
position:absolute;
width:6px;
height:6px;
background:#ff4d6d;
border-radius:50%;
box-shadow:0 0 10px #ff4d6d;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.6);}
100%{transform:scale(1);}
}

/* RISK HEAT MAP */
.riskBox{
margin-top:12px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
}

.riskBar{
height:10px;
border-radius:6px;
margin-top:6px;
overflow:hidden;
background:#222;
}

.riskFill{
height:100%;
transition:width 0.5s ease;
}

.low{background:#2a9d8f;}
.med{background:#f4a261;}
.high{background:#e76f51;}
.very{background:#d00000;}

.riskLabel{
font-size:11px;
opacity:0.85;
margin-top:6px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="hero">
<h1>AstraZeneca Global Vaccine Development & Distribution</h1>
<p>Hybrid Agile–Waterfall Work Breakdown Structure for COVID-19 vaccine development.</p>
</div>

<input placeholder="Search WBS..." />

<div id="tree"></div>

</div>

<!-- RIGHT -->
<div class="right" id="panel">

<div class="title">Select a Work Package</div>

<div style="font-size:12px;opacity:0.75;">
Click any node to view governance, ownership, and risk profile.
</div>

<div class="globe">
<div class="pin" style="top:40%;left:25%;"></div>
<div class="pin" style="top:35%;left:60%;"></div>
<div class="pin" style="top:55%;left:70%;"></div>
<div class="pin" style="top:65%;left:45%;"></div>
<div class="pin" style="top:30%;left:75%;"></div>
</div>

</div>

</div>

<script>

/* ================= WBS (FULL + UNCHANGED STRUCTURE) ================= */

const data = {
id:"1",
title:"AstraZeneca Global Vaccine Development & Distribution",
level:1,
children:[

{
id:"1",
title:"Research and Development",
level:2,
children:[
{id:"1.1",title:"Covid-19 Literature Research & Review",level:3,children:[{id:"1.1.1",title:"Document Covid-19 Research",level:4}]},
{id:"1.2",title:"Vaccine Prototype",level:3,children:[{id:"1.2.1",title:"Analyze Prototype Results & Assess Data Findings",level:4}]},
{id:"1.3",title:"Preclinical Testing",level:3,children:[
{id:"1.3.1",title:"Collect & Prepare Preclinical Materials",level:4},
{id:"1.3.2.1",title:"Safety & Efficacy Studies",level:4}
]},
{id:"1.4",title:"R&D Documentation",level:3,children:[{id:"1.4.1",title:"Report Findings to Stakeholders",level:4}]}
]
},

{
id:"2",
title:"Clinical Trials",
level:2,
children:[
{id:"2.1",title:"Clinical Trials",level:3,children:[{id:"2.1.1",title:"Document Clinical Trials",level:4}]},
{id:"2.2",title:"Safety Compliance",level:3,children:[
{id:"2.2.1",title:"Research Government Entry Regulations",level:4},
{id:"2.2.2",title:"Align with Stakeholder Requirements",level:4}
]},
{id:"2.3",title:"Dosage & Immunization Response",level:3,children:[{id:"2.3.1",title:"Document Dosage Requirement",level:4}]},
{id:"2.4",title:"Dosage Effectiveness",level:3,children:[{id:"2.4.1",title:"Document Immunization Effectiveness",level:4}]},
{id:"2.5",title:"Data Analysis & Reporting",level:3,children:[{id:"2.5.1",title:"Review of Findings",level:4}]}
]
},

{
id:"3",
title:"Regulatory Approval",
level:2,
children:[
{id:"3.1",title:"Submission of Trial Data",level:3,children:[{id:"3.1.1",title:"Gather Findings",level:4}]},
{id:"3.2",title:"Regulatory Documentation",level:3,children:[{id:"3.2.1",title:"Compile All Data Into System",level:4}]},
{id:"3.3",title:"Regulatory Review",level:3,children:[{id:"3.3.1",title:"Discuss Findings",level:4}]},
{id:"3.4",title:"Licensing & Approval",level:3,children:[{id:"3.4.1",title:"Document Approval",level:4}]}
]
},

{
id:"4",
title:"Manufacturing & Supply",
level:2,
children:[
{id:"4.1",title:"Production Scaling",level:3,children:[{id:"4.1.1",title:"Document Requirements",level:4}]},
{id:"4.2",title:"Securing Materials",level:3,children:[{id:"4.2.1",title:"Budget Allocation",level:4}]},
{id:"4.3",title:"Quality Control Testing",level:3,children:[
{id:"4.3.1",title:"QC Test Results",level:4},
{id:"4.3.2",title:"DoD Reporting",level:4}
]},
{id:"4.6",title:"Supply Chain Communication",level:3,children:[
{id:"4.6.1",title:"Stakeholder Communication",level:4}
]}
]
},

{
id:"5",
title:"Distribution & Logistics",
level:2,
children:[
{id:"5.1",title:"Storage & Transport",level:3,children:[{id:"5.1.1",title:"Storage Requirements",level:4}]},
{id:"5.2",title:"Distribution Analysis",level:3,children:[{id:"5.2.1",title:"Stakeholder Coordination",level:4}]},
{id:"5.3",title:"Delivery",level:3,children:[{id:"5.3.1",title:"Global Tracking System",level:4}]},
{id:"5.5",title:"Distribution Documentation",level:3,children:[{id:"5.5.1",title:"DoD Coherence Meeting",level:4}]}
]
},

{
id:"6",
title:"Project Management Compliance",
level:2,
children:[
{id:"6.1",title:"Stakeholder Reporting",level:3,children:[
{id:"6.1.1",title:"Online Dashboard",level:4},
{id:"6.1.2",title:"Scrum Reviews",level:4}
]},
{id:"6.2",title:"Risk Management",level:3,children:[{id:"6.2.1",title:"Risk Logs",level:4}]},
{id:"6.3",title:"Budget Tracking",level:3,children:[{id:"6.3.1",title:"Budget Communications",level:4}]},
{id:"6.4",title:"Compliance Framework",level:3,children:[{id:"6.4.1",title:"Regulatory Docs",level:4}]},
{id:"6.5",title:"Auditing & Documentations",level:3,children:[]}
]
}

]
};

/* ================= OWNER LOGIC ================= */

function getOwner(n){
if(n.id.startsWith("6")) return "PMO / Governance Office";
if(n.id.startsWith("3")) return "Government Regulatory Bodies";
if(n.id.startsWith("2")) return "Clinical Oversight (AZ + Regulators)";
if(n.id.startsWith("4")) return "AstraZeneca Manufacturing Division";
if(n.id.startsWith("5")) return "Government Logistics / DoD";
if(n.id.startsWith("1")) return "AstraZeneca R&D + Oxford";
return "Joint Governance";
}

/* ================= RISK LOGIC ================= */

function getRisk(n){
if(n.id.startsWith("1")) return {label:"R&D Risk",level:"med",value:50};
if(n.id.startsWith("2")) return {label:"Clinical Risk",level:"high",value:75};
if(n.id.startsWith("3")) return {label:"Regulatory Risk",level:"very",value:90};
if(n.id.startsWith("4")) return {label:"Manufacturing Risk",level:"high",value:80};
if(n.id.startsWith("5")) return {label:"Distribution Risk",level:"very",value:85};
if(n.id.startsWith("6")) return {label:"PMO Risk",level:"med",value:45};
return {label:"General Risk",level:"low",value:30};
}

/* ================= TREE ================= */

function render(n){
const wrap=document.createElement("div");
wrap.className="node";

const item=document.createElement("div");
item.className="item l"+n.level;
item.textContent=n.id+" — "+n.title;

const children=document.createElement("div");
children.className="children";

item.onclick=()=>{
children.classList.toggle("open");
show(n);
};

if(n.children){
n.children.forEach(c=>children.appendChild(render(c)));
}

wrap.appendChild(item);
if(n.children) wrap.appendChild(children);

return wrap;
}

/* ================= PANEL ================= */

function show(n){

const risk=getRisk(n);

document.getElementById("panel").innerHTML=`
<div class="title">${n.id} — ${n.title}</div>

<div>
<span class="badge red">Hybrid Model</span>
<span class="badge purple">Level ${n.level}</span>
<span class="badge green">Governance Active</span>
</div>

<div style="margin-top:10px;font-size:12px;">
<b>Owner:</b> ${getOwner(n)}
</div>

<div class="riskBox">
<b>Risk Heat Map</b>
<div class="riskLabel">${risk.label}</div>
<div class="riskBar">
<div class="riskFill ${risk.level}" style="width:${risk.value}%"></div>
</div>
</div>

<div style="margin-top:10px;font-size:12px;opacity:0.8;">
This WBS element contributes to AstraZeneca’s global vaccine delivery program under hybrid Agile–Waterfall governance.
</div>
`;
}

/* INIT */
document.getElementById("tree").appendChild(render(data));

</script>

</body>
</html>
